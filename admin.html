<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AM Curation · Analytics</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Bebas+Neue&family=Noto+Sans+KR:wght@300;400;500&display=swap');

  :root {
    --bg:     #0e0e0c;
    --bg2:    #161614;
    --bg3:    #1e1e1b;
    --border: #2a2a26;
    --text:   #e8e4dc;
    --muted:  #6a6860;
    --accent: #c8b896;
    --green:  #7ab87a;
    --red:    #c87a7a;
    --yellow: #c8b87a;
    --blue:   #7aa8c8;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Noto Sans KR', sans-serif; font-weight: 300; min-height: 100vh; }

  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 20px 32px; border-bottom: 1px solid var(--border);
    position: sticky; top: 0; background: var(--bg); z-index: 100;
  }
  .logo { font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 3px; color: var(--accent); }
  .logo-sub { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); letter-spacing: 1px; margin-left: 12px; }
  .refresh-btn {
    font-family: 'DM Mono', monospace; font-size: 11px;
    background: transparent; border: 1px solid var(--border);
    color: var(--muted); padding: 6px 14px; cursor: pointer;
    letter-spacing: 1px; text-transform: uppercase; transition: all .2s;
  }
  .refresh-btn:hover { border-color: var(--accent); color: var(--accent); }
  .last-updated { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); margin-right: 12px; }

  main { padding: 32px; max-width: 1280px; margin: 0 auto; }

  .filter-row { display: flex; gap: 8px; margin-bottom: 32px; }
  .filter-btn {
    font-family: 'DM Mono', monospace; font-size: 11px;
    background: transparent; border: 1px solid var(--border);
    color: var(--muted); padding: 7px 16px; cursor: pointer;
    letter-spacing: 1px; text-transform: uppercase; transition: all .2s;
  }
  .filter-btn.active, .filter-btn:hover { border-color: var(--accent); color: var(--accent); background: rgba(200,184,150,.06); }

  .section-title {
    font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted);
    letter-spacing: 2px; text-transform: uppercase; margin-bottom: 16px;
    display: flex; align-items: center; gap: 12px;
  }
  .section-title::after { content:''; flex:1; height:1px; background:var(--border); }

  .kpi-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 1px; background: var(--border); margin-bottom: 32px; }
  .kpi-card { background: var(--bg2); padding: 24px 20px; }
  .kpi-label { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted); letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 12px; }
  .kpi-value { font-family: 'Bebas Neue', sans-serif; font-size: 44px; line-height: 1; }
  .kpi-sub { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted); margin-top: 6px; }

  .two-col   { display: grid; grid-template-columns: 1fr 1fr; gap: 1px; background: var(--border); margin-bottom: 1px; }
  .three-col { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1px; background: var(--border); margin-bottom: 32px; }
  .panel { background: var(--bg2); padding: 24px; }

  .data-table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .data-table th {
    font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted);
    letter-spacing: 1px; text-transform: uppercase; padding: 10px 12px;
    text-align: left; border-bottom: 1px solid var(--border); font-weight: 400;
  }
  .data-table td { padding: 10px 12px; border-bottom: 1px solid var(--border); vertical-align: middle; }
  .data-table tr:last-child td { border-bottom: none; }
  .data-table tr:hover td { background: rgba(255,255,255,.02); }

  .bar-track { flex: 1; height: 4px; background: var(--bg3); border-radius: 2px; }
  .bar-fill  { height: 100%; border-radius: 2px; transition: width .6s cubic-bezier(.16,1,.3,1); }

  .rate-pill { font-family: 'DM Mono', monospace; font-size: 10px; padding: 3px 8px; border-radius: 2px; display: inline-block; }
  .rate-pill.high   { background: rgba(122,184,122,.15); color: var(--green); }
  .rate-pill.mid    { background: rgba(200,184,122,.15); color: var(--yellow); }
  .rate-pill.low    { background: rgba(200,122,122,.15); color: var(--red); }

  .loading { display: flex; align-items: center; justify-content: center; padding: 48px; color: var(--muted); font-family: 'DM Mono', monospace; font-size: 12px; }
  .spinner { width: 14px; height: 14px; border: 1px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .8s linear infinite; margin-right: 10px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .scroll-wrap { max-height: 360px; overflow-y: auto; }
  .scroll-wrap::-webkit-scrollbar { width: 3px; }
  .scroll-wrap::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  @media (max-width: 900px) {
    main { padding: 16px; }
    .kpi-grid, .three-col { grid-template-columns: repeat(2, 1fr); }
    .two-col { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<header>
  <div>
    <span class="logo">WITH AM</span>
    <span class="logo-sub">Curation Analytics</span>
  </div>
  <div style="display:flex;align-items:center;">
    <span class="last-updated" id="lastUpdated">—</span>
    <button class="refresh-btn" onclick="loadData()">↻ 새로고침</button>
  </div>
</header>

<main>
  <div class="filter-row">
    <button class="filter-btn active" onclick="setFilter(this,1)">오늘</button>
    <button class="filter-btn" onclick="setFilter(this,7)">7일</button>
    <button class="filter-btn" onclick="setFilter(this,30)">30일</button>
    <button class="filter-btn" onclick="setFilter(this,0)">전체</button>
  </div>

  <p class="section-title">핵심 지표</p>
  <div class="kpi-grid" id="kpiGrid">
    <div class="loading"><div class="spinner"></div>로딩 중</div>
  </div>

  <p class="section-title">원단별 상세</p>
  <div class="two-col" style="margin-bottom:32px;">
    <div class="panel">
      <p class="section-title" style="margin-bottom:16px;">① 순방문자 수 <span style="color:var(--muted);font-size:9px;margin-left:6px;">세션 중복 제거</span></p>
      <div class="scroll-wrap">
        <table class="data-table">
          <thead><tr><th>원단</th><th style="text-align:right;">방문자</th><th style="width:40%;">비율</th></tr></thead>
          <tbody id="uniqueBody"><tr><td colspan="3"><div class="loading"><div class="spinner"></div></div></td></tr></tbody>
        </table>
      </div>
    </div>
    <div class="panel">
      <p class="section-title" style="margin-bottom:16px;">② 이미지 넘김 비율 <span style="color:var(--muted);font-size:9px;margin-left:6px;">클릭 대비 스와이프</span></p>
      <div class="scroll-wrap">
        <table class="data-table">
          <thead><tr><th>원단</th><th style="text-align:right;">클릭</th><th style="text-align:right;">스와이프</th><th style="text-align:right;">비율</th></tr></thead>
          <tbody id="swipeBody"><tr><td colspan="4"><div class="loading"><div class="spinner"></div></div></td></tr></tbody>
        </table>
      </div>
    </div>
  </div>

  <p class="section-title">행동 분석</p>
  <div class="three-col">
    <div class="panel">
      <p class="section-title" style="margin-bottom:16px;">③ 평균 이미지 뎁스 <span style="color:var(--muted);font-size:9px;margin-left:4px;">몇 번째까지</span></p>
      <div id="depthPanel"><div class="loading"><div class="spinner"></div></div></div>
    </div>
    <div class="panel">
      <p class="section-title" style="margin-bottom:16px;">④ 모달 체류시간 <span style="color:var(--muted);font-size:9px;margin-left:4px;">평균 초</span></p>
      <div id="durationPanel"><div class="loading"><div class="spinner"></div></div></div>
    </div>
    <div class="panel">
      <p class="section-title" style="margin-bottom:16px;">⑤ 클릭 → 상담 전환율</p>
      <div id="conversionPanel"><div class="loading"><div class="spinner"></div></div></div>
    </div>
  </div>
</main>

<script>
const NOTION_TOKEN = prompt('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') || '';
const NOTION_DB_ID = '34b563728910804f9033d157a9cfdcef';
let FILTER_DAYS = 1;
let allEvents   = [];

function setFilter(btn, days) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  FILTER_DAYS = days;
  renderAll();
}

function filterByDate(events) {
  if (FILTER_DAYS === 0) return events;
  const cutoff = new Date();
  cutoff.setDate(cutoff.getDate() - FILTER_DAYS);
  return events.filter(e => new Date(e.timestamp) >= cutoff);
}

async function fetchAllPages() {
  let results = [], cursor;
  do {
    const body = { page_size: 100, sorts: [{ property: 'timestamp', direction: 'descending' }] };
    if (cursor) body.start_cursor = cursor;
    const res  = await fetch(`https://api.notion.com/v1/databases/${NOTION_DB_ID}/query`, {
      method: 'POST',
      headers: { 'Authorization': `Bearer ${NOTION_TOKEN}`, 'Content-Type': 'application/json', 'Notion-Version': '2022-06-28' },
      body: JSON.stringify(body),
    });
    const data = await res.json();
    results = results.concat(data.results || []);
    cursor  = data.has_more ? data.next_cursor : undefined;
  } while (cursor);
  return results;
}

function parseEvents(pages) {
  return pages.map(p => {
    const props = p.properties;
    let extra = {};
    try { extra = JSON.parse(props.extra?.rich_text?.[0]?.plain_text || '{}'); } catch {}
    return {
      event_type:  props.event_type?.select?.name || '',
      fabric_name: props.fabric_name?.title?.[0]?.plain_text || '',
      timestamp:   props.timestamp?.date?.start || '',
      session_id:  props.session_id?.rich_text?.[0]?.plain_text || '',
      extra,
    };
  });
}

async function loadData() {
  document.getElementById('lastUpdated').textContent = '로딩 중…';
  try {
    allEvents = parseEvents(await fetchAllPages());
    renderAll();
    document.getElementById('lastUpdated').textContent =
      '업데이트 ' + new Date().toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' });
  } catch(e) {
    document.getElementById('lastUpdated').textContent = '오류: ' + e.message;
  }
}

function renderAll() {
  const ev = filterByDate(allEvents);
  renderKPI(ev);
  renderUniqueVisitors(ev);
  renderSwipeRate(ev);
  renderDepth(ev);
  renderDuration(ev);
  renderConversion(ev);
}

function renderKPI(ev) {
  const uniqueSessions  = new Set(ev.filter(e => e.event_type === 'fabric_click').map(e => e.session_id)).size;
  const clicks          = ev.filter(e => e.event_type === 'fabric_click').length;
  const swipes          = ev.filter(e => e.event_type === 'modal_image_swipe').length;
  const swipeRate       = clicks > 0 ? ((swipes / clicks) * 100).toFixed(0) : 0;
  const swipeEvents     = ev.filter(e => e.event_type === 'modal_image_swipe' && e.extra?.slide_index);
  const avgDepth        = swipeEvents.length > 0
    ? (swipeEvents.reduce((s,e) => s + (e.extra.slide_index||0), 0) / swipeEvents.length).toFixed(1) : 0;
  const closeEvents     = ev.filter(e => e.event_type === 'modal_close' && e.extra?.duration_sec >= 0);
  const avgDuration     = closeEvents.length > 0
    ? (closeEvents.reduce((s,e) => s + (e.extra.duration_sec||0), 0) / closeEvents.length).toFixed(1) : 0;
  const consultSessions = new Set(ev.filter(e => e.event_type === 'consult_click').map(e => e.session_id)).size;
  const convRate        = uniqueSessions > 0 ? ((consultSessions / uniqueSessions) * 100).toFixed(1) : 0;

  document.getElementById('kpiGrid').innerHTML = `
    <div class="kpi-card"><div class="kpi-label">① 순방문자</div><div class="kpi-value" style="color:var(--text)">${uniqueSessions}</div><div class="kpi-sub">세션 중복 제거</div></div>
    <div class="kpi-card"><div class="kpi-label">② 이미지 넘김률</div><div class="kpi-value" style="color:var(--yellow)">${swipeRate}%</div><div class="kpi-sub">클릭 대비 스와이프</div></div>
    <div class="kpi-card"><div class="kpi-label">③ 평균 이미지 뎁스</div><div class="kpi-value" style="color:var(--blue)">${avgDepth}</div><div class="kpi-sub">평균 몇 번째까지</div></div>
    <div class="kpi-card"><div class="kpi-label">④ 평균 체류시간</div><div class="kpi-value" style="color:var(--accent)">${avgDuration}초</div><div class="kpi-sub">모달 열고 닫기 기준</div></div>
    <div class="kpi-card"><div class="kpi-label">⑤ 상담 전환율</div><div class="kpi-value" style="color:var(--green)">${convRate}%</div><div class="kpi-sub">방문 → 스와치 담기</div></div>
  `;
}

function renderUniqueVisitors(ev) {
  const map = {};
  ev.filter(e => e.event_type === 'fabric_click').forEach(e => {
    if (!map[e.fabric_name]) map[e.fabric_name] = new Set();
    map[e.fabric_name].add(e.session_id);
  });
  const sorted = Object.entries(map).map(([n,s]) => [n, s.size]).sort((a,b) => b[1]-a[1]);
  const max = sorted[0]?.[1] || 1;
  document.getElementById('uniqueBody').innerHTML = sorted.length
    ? sorted.map(([name, cnt]) => `
      <tr>
        <td style="font-size:12px;">${name}</td>
        <td style="font-family:'DM Mono',monospace;font-size:13px;color:var(--accent);text-align:right;">${cnt}</td>
        <td><div style="display:flex;align-items:center;gap:8px;">
          <div class="bar-track" style="flex:1;"><div class="bar-fill" style="background:var(--accent);width:${(cnt/max*100).toFixed(1)}%"></div></div>
        </div></td>
      </tr>`).join('')
    : '<tr><td colspan="3" style="text-align:center;padding:20px;color:var(--muted);font-size:12px;">데이터 없음</td></tr>';
}

function renderSwipeRate(ev) {
  const clickMap = {}, swipeMap = {};
  ev.filter(e => e.event_type === 'fabric_click').forEach(e => { clickMap[e.fabric_name] = (clickMap[e.fabric_name]||0)+1; });
  ev.filter(e => e.event_type === 'modal_image_swipe').forEach(e => { swipeMap[e.fabric_name] = (swipeMap[e.fabric_name]||0)+1; });
  const sorted = Object.keys(clickMap)
    .map(n => ({ name:n, click:clickMap[n], swipe:swipeMap[n]||0 }))
    .map(x => ({ ...x, rate: x.click > 0 ? x.swipe/x.click*100 : 0 }))
    .sort((a,b) => b.rate - a.rate);
  document.getElementById('swipeBody').innerHTML = sorted.length
    ? sorted.map(x => {
        const rc = x.rate >= 50 ? 'high' : x.rate >= 20 ? 'mid' : 'low';
        return `<tr>
          <td style="font-size:12px;">${x.name}</td>
          <td style="font-family:'DM Mono',monospace;font-size:12px;color:var(--muted);text-align:right;">${x.click}</td>
          <td style="font-family:'DM Mono',monospace;font-size:12px;color:var(--muted);text-align:right;">${x.swipe}</td>
          <td style="text-align:right;"><span class="rate-pill ${rc}">${x.rate.toFixed(0)}%</span></td>
        </tr>`;
      }).join('')
    : '<tr><td colspan="4" style="text-align:center;padding:20px;color:var(--muted);font-size:12px;">데이터 없음</td></tr>';
}

function renderDepth(ev) {
  const swipes = ev.filter(e => e.event_type === 'modal_image_swipe' && e.extra?.slide_index);
  const sessionMax = {};
  swipes.forEach(e => {
    const key = `${e.session_id}__${e.fabric_name}`;
    sessionMax[key] = Math.max(sessionMax[key]||0, e.extra.slide_index);
  });
  const fabricSum = {}, fabricCnt = {};
  Object.entries(sessionMax).forEach(([key, val]) => {
    const name = key.split('__')[1];
    fabricSum[name] = (fabricSum[name]||0) + val;
    fabricCnt[name] = (fabricCnt[name]||0) + 1;
  });
  const sorted = Object.keys(fabricSum).map(n => ({ name:n, avg: fabricSum[n]/fabricCnt[n] })).sort((a,b) => b.avg-a.avg);
  const maxAvg = sorted[0]?.avg || 1;
  document.getElementById('depthPanel').innerHTML = sorted.length
    ? `<div style="display:flex;flex-direction:column;gap:12px;">${sorted.map(x => `
        <div>
          <div style="display:flex;justify-content:space-between;margin-bottom:5px;">
            <span style="font-size:12px;">${x.name}</span>
            <span style="font-family:'DM Mono',monospace;font-size:11px;color:var(--blue);">${x.avg.toFixed(1)}번째</span>
          </div>
          <div class="bar-track"><div class="bar-fill" style="background:var(--blue);width:${(x.avg/maxAvg*100).toFixed(1)}%"></div></div>
        </div>`).join('')}</div>`
    : '<p style="color:var(--muted);font-size:12px;padding:20px 0;">데이터 없음</p>';
}

function renderDuration(ev) {
  const closes = ev.filter(e => e.event_type === 'modal_close' && e.extra?.duration_sec >= 0);
  const sum = {}, cnt = {};
  closes.forEach(e => {
    sum[e.fabric_name] = (sum[e.fabric_name]||0) + e.extra.duration_sec;
    cnt[e.fabric_name] = (cnt[e.fabric_name]||0) + 1;
  });
  const sorted = Object.keys(sum).map(n => ({ name:n, avg: sum[n]/cnt[n] })).sort((a,b) => b.avg-a.avg);
  const maxAvg = sorted[0]?.avg || 1;
  document.getElementById('durationPanel').innerHTML = sorted.length
    ? `<div style="display:flex;flex-direction:column;gap:12px;">${sorted.map(x => `
        <div>
          <div style="display:flex;justify-content:space-between;margin-bottom:5px;">
            <span style="font-size:12px;">${x.name}</span>
            <span style="font-family:'DM Mono',monospace;font-size:11px;color:var(--yellow);">${x.avg.toFixed(1)}s</span>
          </div>
          <div class="bar-track"><div class="bar-fill" style="background:var(--yellow);width:${(x.avg/maxAvg*100).toFixed(1)}%"></div></div>
        </div>`).join('')}</div>`
    : '<p style="color:var(--muted);font-size:12px;padding:20px 0;">데이터 없음</p>';
}

function renderConversion(ev) {
  const clickSessions   = new Set(ev.filter(e => e.event_type === 'fabric_click').map(e => e.session_id));
  const consultSessions = new Set(ev.filter(e => e.event_type === 'consult_click').map(e => e.session_id));
  const submitSessions  = new Set(ev.filter(e => e.event_type === 'form_submit').map(e => e.session_id));
  const total    = clickSessions.size || 1;
  const toCart   = [...consultSessions].filter(s => clickSessions.has(s)).length;
  const toSubmit = submitSessions.size;
  const steps = [
    { label:'원단 클릭',    cnt: clickSessions.size, color:'var(--accent)' },
    { label:'스와치 담기',  cnt: toCart,             color:'var(--yellow)' },
    { label:'폼 제출 완료', cnt: toSubmit,           color:'var(--green)'  },
  ];
  document.getElementById('conversionPanel').innerHTML = `
    <div style="display:flex;flex-direction:column;gap:18px;">
      ${steps.map((s,i) => {
        const rate = i===0 ? 100 : steps[i-1].cnt > 0 ? (s.cnt/steps[i-1].cnt*100).toFixed(0) : 0;
        return `<div>
          <div style="display:flex;justify-content:space-between;margin-bottom:5px;">
            <span style="font-size:12px;">${s.label}</span>
            <span style="font-family:'DM Mono',monospace;font-size:11px;color:${s.color};">${s.cnt}명 · ${rate}%</span>
          </div>
          <div class="bar-track"><div class="bar-fill" style="background:${s.color};width:${(s.cnt/total*100).toFixed(1)}%"></div></div>
        </div>`;
      }).join('')}
    </div>`;
}

loadData();
</script>
</body>
</html>
